    <h1><strong>Puntius hemictenus</strong></h1>
    <p><strong>Puntius hemictenus</strong> es una especie de peces de la familia de los Cyprinidae en el orden de los Cypriniformes.</p>
    <h3><strong>Morfología</strong></h3>
    <p>Los machos pueden llegar alcanzar los 10 cm de longitud total.</p>
    <h3><strong>Hábitat</strong></h3>
    <p>Es un pez de agua dulce.</p>
    <h3><strong>Distribución geográfica</strong></h3>
    <p>Se encuentran en Asia</p>
